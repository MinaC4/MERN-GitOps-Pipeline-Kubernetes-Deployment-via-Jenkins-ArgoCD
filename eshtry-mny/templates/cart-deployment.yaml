apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: {{ .Values.images.cart }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        ports:
        - containerPort: 9003
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
